<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#4a0918" />
  <title>DCS Letter Management - Dashboard</title>
  <link rel="stylesheet" href="css/sinhala.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <a class="skip-link" href="#main" data-i18n="skipToContent">Skip to main content</a>
  <header class="app-header">
    <h1 data-i18n="dashboardTitle">All Letters</h1>
    <nav>
      <a href="new-letter.html" data-i18n="newLetter">New Letter</a>
      <a href="print-numbers.html" data-i18n="printNumbers">Print Numbers</a>
      <button id="subjectOfficerNavBtn" type="button">-</button>
      <button class="lang-toggle" data-lang-toggle type="button">සිංහල / English</button>
      <button id="logoutBtn" data-i18n="logout">Logout</button>
    </nav>
  </header>

  <dialog id="letterDetailDialog" class="dialog-wide">
    <div id="letterDetailContent"></div>
    <div class="dialog-actions">
      <button type="button" id="letterDetailCloseBtn" data-i18n="close">Close</button>
    </div>
  </dialog>

  <dialog id="reviewDialog">
    <form id="reviewForm">
      <h2 data-i18n="reviewDialogTitle">Review &amp; Assign Relevant Officer</h2>
      <dl class="letter-details" id="reviewLetterInfo"></dl>

      <label for="reviewRelevantOfficer" data-i18n="relevantOfficer">Relevant Officer</label>
      <select id="reviewRelevantOfficer" required></select>

      <div class="dialog-actions">
        <button type="submit" data-i18n="sendToSubjectOfficerBtn">Send to Subject Officer</button>
        <button type="button" id="reviewCancelBtn" data-i18n="cancel">Cancel</button>
      </div>
      <p id="reviewStatus" class="status-message" role="status" aria-live="polite"></p>
    </form>
  </dialog>

  <dialog id="subjectOfficerDialog">
    <form id="subjectOfficerForm">
      <h2 data-i18n="subjectOfficerSettingsTitle">Subject Officer</h2>
      <p class="subtitle" data-i18n="subjectOfficerSettingsHint">
        This person is used as the Subject Officer on every letter.
      </p>

      <label for="soName" data-i18n="officerName">Name</label>
      <input type="text" id="soName" required />

      <label for="soEmail" data-i18n="officerEmail">Email</label>
      <input type="email" id="soEmail" required />

      <div class="dialog-actions">
        <button type="submit" data-i18n="save">Save</button>
        <button type="button" id="soCancelBtn" data-i18n="cancel">Cancel</button>
      </div>
      <p id="soStatus" class="status-message" role="status" aria-live="polite"></p>
    </form>
  </dialog>

  <main id="main">
    <form id="filterForm" class="filter-bar">
      <input type="text" id="search" data-i18n-placeholder="searchPlaceholder" placeholder="Search..." />
      <select id="filterDivision">
        <option value="" data-i18n="allDivisions">All divisions</option>
      </select>
      <select id="filterStatus">
        <option value="" data-i18n="allStatuses">All statuses</option>
        <option value="pending_review">pending_review</option>
        <option value="created">created</option>
        <option value="sent_to_subject">sent_to_subject</option>
        <option value="with_subject_officer">with_subject_officer</option>
        <option value="sent_to_relevant">sent_to_relevant</option>
        <option value="with_relevant_officer">with_relevant_officer</option>
        <option value="action_taken">action_taken</option>
        <option value="closed">closed</option>
      </select>
      <button type="submit" data-i18n="filter">Filter</button>
    </form>
    <p id="pendingReviewCount" class="status-message" role="status" aria-live="polite"></p>

    <div class="table-scroll">
      <table class="letters-table">
        <thead>
          <tr>
            <th data-i18n="letterNumber">Letter No.</th>
            <th data-i18n="subject">Subject</th>
            <th data-i18n="sender">Sender</th>
            <th data-i18n="subjectOfficer">Subject Officer</th>
            <th data-i18n="relevantOfficer">Relevant Officer</th>
            <th data-i18n="status">Status</th>
            <th data-i18n="actions">Actions</th>
          </tr>
        </thead>
        <tbody id="lettersTableBody"></tbody>
      </table>
    </div>
    <p id="emptyState" data-i18n="noLetters" hidden>No letters found.</p>
  </main>

  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/letters.js"></script>
  <script>
    const divisionFilter = document.getElementById('filterDivision');
    window.APP_CONFIG.DIVISIONS.forEach((d) => {
      const opt = document.createElement('option');
      opt.value = d.code;
      opt.textContent = `${d.code} - ${d.name[window.i18n.currentLang()] || d.name.en}`;
      divisionFilter.appendChild(opt);
    });

    async function loadLetters() {
      const tbody = document.getElementById('lettersTableBody');
      const emptyState = document.getElementById('emptyState');
      const pendingReviewCount = document.getElementById('pendingReviewCount');
      const columnLabels = Array.from(
        document.querySelectorAll('.letters-table thead th')
      ).map((th) => th.textContent);
      try {
        const { letters } = await window.letters.list({
          search: document.getElementById('search').value,
          division: divisionFilter.value,
          status: document.getElementById('filterStatus').value,
        });
        tbody.innerHTML = letters
          .map(
            (l) => `
          <tr>
            <td data-label="${columnLabels[0]}">${l.letter_number}</td>
            <td data-label="${columnLabels[1]}">${l.subject || '-'}</td>
            <td data-label="${columnLabels[2]}">${l.sender_name || '-'}</td>
            <td data-label="${columnLabels[3]}">${l.subject_officer_name || '-'}</td>
            <td data-label="${columnLabels[4]}">${l.relevant_officer_name || '-'}</td>
            <td data-label="${columnLabels[5]}"><span class="status-badge status-${l.status}">${l.status}</span></td>
            <td data-label="${columnLabels[6]}">
              <button type="button" class="view-letter-btn" data-id="${l.id}">${window.i18n.t('view')}</button>
              ${l.status === 'pending_review'
                ? `<button type="button" class="review-btn" data-id="${l.id}">${window.i18n.t('reviewBtn')}</button>`
                : ''}
            </td>
          </tr>`
          )
          .join('');
        emptyState.hidden = letters.length !== 0;

        const pendingCount = letters.filter((l) => l.status === 'pending_review').length;
        pendingReviewCount.textContent = pendingCount
          ? `${window.i18n.t('pendingReviewQueue')}: ${pendingCount}`
          : '';
      } catch (err) {
        if (err.message === 'Not authenticated') {
          window.location.href = 'index.html';
        }
      }
    }

    // F8/F11: full per-letter trail, including the exact Action Taken text
    // the Relevant Officer entered - the table itself only has room for a
    // summary, so this opens the rest in a dialog.
    function formatTimestamp(value) {
      if (!value) return null;
      const d = new Date(String(value).replace(' ', 'T'));
      return Number.isNaN(d.getTime())
        ? value
        : d.toLocaleString(window.i18n.currentLang() === 'si' ? 'si-LK' : 'en-LK');
    }

    function renderLetterDetail(letter, reassignments) {
      const officer = (name, email) => (name ? `${name}${email ? ` (${email})` : ''}` : '-');
      const rows = [
        ['letterNumber', letter.letter_number],
        ['division', window.APP_CONFIG.divisionName(letter.division, window.i18n.currentLang())],
        ['subject', letter.subject || '-'],
        ['sender', letter.sender_name || '-'],
        ['receivedDate', letter.received_date || '-'],
        ['createdBy', window.i18n.t(letter.created_by_role === 'subject_officer' ? 'createdBySubjectOfficer' : 'createdByDcs')],
        ['subjectOfficer', officer(letter.subject_officer_name, letter.subject_officer_email)],
        ['relevantOfficer', officer(letter.relevant_officer_name, letter.relevant_officer_email)],
        ['status', letter.status],
        ['subjectOfficerReceivedAt', formatTimestamp(letter.subject_officer_received_at) || '-'],
        ['sentToRelevantOfficer', formatTimestamp(letter.sent_to_relevant_at) || '-'],
        ['relevantOfficerReceivedAt', formatTimestamp(letter.relevant_officer_received_at) || '-'],
        ['actionTakenAt', formatTimestamp(letter.action_taken_at) || '-'],
      ];

      const reassignmentHistory = (reassignments || [])
        .map(
          (r) =>
            `<li>${r.from_officer_name} &rarr; ${r.to_officer_name}${r.note ? `: ${r.note}` : ''} <span class="reassign-date">(${formatTimestamp(r.reassigned_at)})</span></li>`
        )
        .join('');

      document.getElementById('letterDetailContent').innerHTML = `
        <h2>${letter.letter_number}</h2>
        <dl class="letter-details">
          ${rows.map(([key, value]) => `<dt>${window.i18n.t(key)}</dt><dd>${value}</dd>`).join('')}
        </dl>
        <h3>${window.i18n.t('actionTaken')}</h3>
        <p class="action-taken-text">${letter.action_notes || window.i18n.t('noActionYet')}</p>
        ${reassignmentHistory
          ? `<h3>${window.i18n.t('reassignmentHistory')}</h3><ul class="reassign-history">${reassignmentHistory}</ul>`
          : ''}
      `;
    }

    const letterDetailDialog = document.getElementById('letterDetailDialog');
    document.getElementById('lettersTableBody').addEventListener('click', async (e) => {
      const btn = e.target.closest('.view-letter-btn');
      if (!btn) return;
      try {
        const { letter, reassignments } = await window.letters.get(btn.dataset.id);
        renderLetterDetail(letter, reassignments);
        letterDetailDialog.showModal();
      } catch (err) {
        if (err.message === 'Not authenticated') {
          window.location.href = 'index.html';
        }
      }
    });

    document.getElementById('letterDetailCloseBtn').addEventListener('click', () => {
      letterDetailDialog.close();
    });

    // Letters the Subject Officer routed here (status 'pending_review') get
    // a "Review" button instead of/alongside "View" - opens a small dialog
    // that finalizes the Relevant Officer and routes the letter back to the
    // Subject Officer (see letters.controller.js#reviewLetter).
    const reviewDialog = document.getElementById('reviewDialog');
    const reviewForm = document.getElementById('reviewForm');
    const reviewRelevantOfficer = document.getElementById('reviewRelevantOfficer');
    const reviewStatus = document.getElementById('reviewStatus');
    let reviewLetterId = null;

    async function openReviewDialog(letter) {
      reviewLetterId = letter.id;
      reviewStatus.textContent = '';
      document.getElementById('reviewLetterInfo').innerHTML = `
        <dt>${window.i18n.t('letterNumber')}</dt><dd>${letter.letter_number}</dd>
        <dt>${window.i18n.t('subject')}</dt><dd>${letter.subject || '-'}</dd>
        <dt>${window.i18n.t('sender')}</dt><dd>${letter.sender_name || '-'}</dd>
      `;

      const { officers } = await window.letters.listOfficers(letter.division);
      reviewRelevantOfficer.innerHTML =
        `<option value="">${window.i18n.t('selectOfficer')}</option>` +
        officers
          .map(
            (o) =>
              `<option value="${o.id}" ${Number(o.id) === Number(letter.relevant_officer_id) ? 'selected' : ''}>${o.name}${o.designation ? ` (${o.designation})` : ''}</option>`
          )
          .join('');

      reviewDialog.showModal();
    }

    document.getElementById('lettersTableBody').addEventListener('click', async (e) => {
      const btn = e.target.closest('.review-btn');
      if (!btn) return;
      try {
        const { letter } = await window.letters.get(btn.dataset.id);
        await openReviewDialog(letter);
      } catch (err) {
        if (err.message === 'Not authenticated') {
          window.location.href = 'index.html';
        }
      }
    });

    document.getElementById('reviewCancelBtn').addEventListener('click', () => {
      reviewDialog.close();
    });

    reviewForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!reviewRelevantOfficer.value) {
        reviewStatus.textContent = window.i18n.t('relevantOfficerRequiredForReview');
        return;
      }
      reviewStatus.textContent = window.i18n.t('submitting');
      try {
        await window.letters.reviewLetter(reviewLetterId, {
          relevantOfficerId: reviewRelevantOfficer.value,
        });
        reviewStatus.textContent = window.i18n.t('officerAssignedSuccess');
        reviewDialog.close();
        await loadLetters();
      } catch (err) {
        reviewStatus.textContent = err.message;
      }
    });

    document.getElementById('filterForm').addEventListener('submit', (e) => {
      e.preventDefault();
      loadLetters();
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await window.api.post('/auth/logout');
      window.location.href = 'index.html';
    });

    // Subject Officer is a single permanent post, changed from here rather
    // than picked per letter (see js/new-letter.js on new-letter.html).
    const subjectOfficerNavBtn = document.getElementById('subjectOfficerNavBtn');
    const subjectOfficerDialog = document.getElementById('subjectOfficerDialog');
    const subjectOfficerForm = document.getElementById('subjectOfficerForm');
    const soNameInput = document.getElementById('soName');
    const soEmailInput = document.getElementById('soEmail');
    const soStatus = document.getElementById('soStatus');

    async function refreshSubjectOfficerButton() {
      const { officer } = await window.letters.getSubjectOfficer();
      subjectOfficerNavBtn.textContent = officer
        ? `${window.i18n.t('subjectOfficer')}: ${officer.name}`
        : window.i18n.t('setSubjectOfficer');
      return officer;
    }

    subjectOfficerNavBtn.addEventListener('click', async () => {
      soStatus.textContent = '';
      const officer = await refreshSubjectOfficerButton();
      soNameInput.value = officer ? officer.name : '';
      soEmailInput.value = officer ? officer.email : '';
      subjectOfficerDialog.showModal();
    });

    document.getElementById('soCancelBtn').addEventListener('click', () => {
      subjectOfficerDialog.close();
    });

    subjectOfficerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      soStatus.textContent = window.i18n.t('submitting');
      try {
        await window.letters.setSubjectOfficer({
          name: soNameInput.value.trim(),
          email: soEmailInput.value.trim(),
        });
        await refreshSubjectOfficerButton();
        subjectOfficerDialog.close();
        loadLetters();
      } catch (err) {
        soStatus.textContent = err.message;
      }
    });

    refreshSubjectOfficerButton();
    loadLetters();
  </script>
</body>
</html>
