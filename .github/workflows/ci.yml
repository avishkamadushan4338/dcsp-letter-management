name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check server files
        run: find server -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Syntax check frontend scripts
        run: find public/js -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Validate locale JSON
        run: |
          node -e "
            JSON.parse(require('fs').readFileSync('public/locales/en.json', 'utf8'));
            JSON.parse(require('fs').readFileSync('public/locales/si.json', 'utf8'));
            console.log('Locale JSON valid');
          "
