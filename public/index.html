<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#4a0918" />
  <title>DCS Letter Management - Login</title>
  <link rel="stylesheet" href="css/sinhala.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="auth-page">
  <a class="skip-link" href="#main" data-i18n="skipToContent">Skip to main content</a>
  <main id="main" class="auth-card">
    <h1 data-i18n="appTitle">Letter Management System</h1>
    <p class="subtitle" data-i18n="loginSubtitle">Southern Province Planning Secretariat</p>

    <form id="loginForm">
      <label for="username" data-i18n="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required />

      <label for="password" data-i18n="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />

      <button type="submit" data-i18n="login">Login</button>
      <p id="loginError" class="error" role="alert" aria-live="polite"></p>
    </form>

    <button class="lang-toggle" data-lang-toggle type="button">සිංහල / English</button>
  </main>

  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('loginError');
      errorEl.textContent = '';
      try {
        const { role } = await window.api.post('/auth/login', {
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        });
        window.location.href = role === 'subject_officer'
          ? 'subject-officer-dashboard.html'
          : 'dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
