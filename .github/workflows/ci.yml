name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck server (TypeScript + Effect)
        run: npm run typecheck -w server

      - name: Typecheck web (TypeScript + React)
        run: npm run typecheck -w web

      - name: Build server
        run: npm run build -w server

      - name: Build web
        run: npm run build -w web

      - name: Validate locale JSON
        run: |
          node -e "
            JSON.parse(require('fs').readFileSync('web/public/locales/en.json', 'utf8'));
            JSON.parse(require('fs').readFileSync('web/public/locales/si.json', 'utf8'));
            console.log('Locale JSON valid');
          "
